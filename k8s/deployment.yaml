apiVersion: apps/v1
kind: Deployment
metadata:
  name: obby-jukebox
  namespace: obby-jukebox
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 2m"
spec:
  # Single replica: the queue lives in memory and there is one WebRTC publisher.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: obby-jukebox
  template:
    metadata:
      labels:
        app: obby-jukebox
    spec:
      # GPU node has headroom for the software VP8 encode.
      nodeSelector:
        gpu: "true"
      tolerations:
        - key: "gpu"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      containers:
        - name: obby-jukebox
          image: 192.168.2.201:5000/obby-jukebox:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: IRC_HOST
              value: irc.h4ks.com
            - name: IRC_PORT
              value: "6697"
            - name: IRC_NICK
              value: jukebox
            - name: VOICE_CHANNEL
              value: "$jukebox"
            - name: STUN_URL
              value: stun:coturn.h4ks.com:3478
            - name: YTDLP_COOKIES
              value: /cookies/cookies.txt
            - name: HTTP_PORT
              value: "8080"
            - name: LOG_LEVEL
              value: info
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "1"
              memory: 512Mi
            limits:
              cpu: "4"
              memory: 2Gi
          volumeMounts:
            - name: ytdlp-cookies
              mountPath: /cookies
              readOnly: true
      volumes:
        - name: ytdlp-cookies
          secret:
            # Reflected from h4kstream-ytdlp-cookies; optional so the pod starts
            # before the first reflection lands.
            secretName: h4kstream-ytdlp-cookies
            optional: true
